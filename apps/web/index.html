<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — ReservasSys</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>ReservasSys</h1>
      <p>Sistema de gestión de turnos</p>
    </div>

    <div id="error-box" class="alert alert-error" style="display:none"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" class="form-control" placeholder="tu@email.com" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" id="submit-btn">
        Iniciar sesión
      </button>
    </form>

    <div class="auth-footer">
      ¿No tenés cuenta? <a href="register.html">Registrate</a>
      <br><br>
      <a href="negocios.html">Ver negocios sin iniciar sesión →</a>
    </div>
  </div>
</div>

<script type="module">
import { identity } from './js/api.js';
import { setSession, redirectByRole, getToken, isAdmin } from './js/auth.js';
import { friendlyError } from './js/utils.js';

// Already logged in
if (getToken()) redirectByRole();

const form      = document.getElementById('login-form');
const submitBtn = document.getElementById('submit-btn');
const errorBox  = document.getElementById('error-box');

form.addEventListener('submit', async e => {
  e.preventDefault();
  errorBox.style.display = 'none';
  submitBtn.disabled = true;
  submitBtn.textContent = 'Ingresando...';

  try {
    const res = await identity.login(
      form.email.value.trim(),
      form.password.value
    );
    // res contains { token, user: { userId, email, roles, tenantId, branchId } }
    setSession(res.token, res.user ?? res);
    redirectByRole();
  } catch (err) {
    errorBox.textContent = friendlyError(err);
    errorBox.style.display = 'block';
    submitBtn.disabled = false;
    submitBtn.textContent = 'Iniciar sesión';
  }
});
</script>
</body>
</html>
